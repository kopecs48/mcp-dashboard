# Map a route prefix to an upstream MCP server.
# Request to http://breadfish.lan:8787/context7/... is forwarded to
# https://mcp.context7.com/mcp/... with headers passed through.
#
# Add auth/api keys here via ${ENV_VAR} — resolved at startup.

upstreams:
  - name: context7
    prefix: /context7
    target: https://mcp.context7.com/mcp
    headers:
      CONTEXT7_API_KEY: ${CONTEXT7_API_KEY}

  - name: gh_grep
    prefix: /gh_grep
    target: https://mcp.grep.app

  - name: github
    prefix: /github
    target: https://api.githubcopilot.com/mcp/
    headers:
      Authorization: Bearer ${GITHUB_PAT}
